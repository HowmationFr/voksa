# Pull request and master CI: nothing merges unless EVERYTHING is green on
# all three OSes (typecheck, lint, unit tests, build, electron-builder
# packaging without publishing, and a real boot smoke test).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    name: Checks (lint, types, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies (postinstall runs patch-package + electron-rebuild)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  packages:
    name: Build + packaging + smoke (${{ matrix.os }})
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Never sign PR builds (secrets are not exposed to forks anyway): the
      # goal is only to prove that packaging succeeds.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (UI + main)
        run: npm run build
      - name: Boot smoke test (Linux, under Xvfb)
        if: runner.os == 'Linux'
        timeout-minutes: 15
        run: xvfb-run -a node scripts/smoke.mjs
      - name: Boot smoke test
        if: runner.os != 'Linux'
        timeout-minutes: 15
        run: node scripts/smoke.mjs
      - name: Package Windows (no publish)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish never
      - name: Package macOS (no publish, unsigned)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish never
      - name: Package Linux (no publish)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --publish never
