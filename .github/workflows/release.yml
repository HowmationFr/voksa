# Release: pushing a vX.Y.Z tag builds the Windows, macOS (signed and
# notarized) and Linux artifacts and uploads them into a DRAFT GitHub
# release. Nothing reaches users (neither the releases page nor the
# auto-updater) until a maintainer clicks "Publish release": that click is
# the manual gate.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  guard:
    name: Guard (tag = version, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Tag must match package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $TAG does not match package.json version ($PKG). Create tags with 'npm version'."
            exit 1
          fi
      - name: Repository field must be set
        run: |
          node -e "const r = String(require('./package.json').repository ?? ''); if (!r || r.includes('VOTRE-COMPTE-GITHUB')) { console.error('package.json repository still contains the placeholder'); process.exit(1); }"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck + tests
        run: npm run typecheck && npm test

  draft:
    name: Create the draft release
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create the draft if it does not exist yet
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            # electron-builder refuses to upload into a PUBLISHED release when
            # it is configured to publish drafts (electron-builder.yml:
            # publish.releaseType), and it SKIPS SILENTLY: the job would go
            # green with zero assets attached. Never create the release by
            # hand, let this job do it.
            IS_DRAFT="$(gh release view "$TAG" --json isDraft -q .isDraft)"
            if [ "$IS_DRAFT" != "true" ]; then
              echo "::error::Release $TAG already exists and is PUBLISHED. electron-builder can only upload into a draft, so it would skip every artifact and this run would be a false green. Turn it back into a draft ('gh release edit $TAG --draft') and re-run, or delete it and let this job recreate it."
              exit 1
            fi
            echo "Draft $TAG already exists, reusing it."
          else
            gh release create "$TAG" --draft --title "Voksa ${TAG#v}" --generate-notes
          fi

  artifacts:
    name: Artifacts (${{ matrix.os }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (UI + main)
        run: npm run build
      - name: Publish Windows artifacts
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
      - name: Publish Linux artifacts
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always
      - name: Publish macOS artifacts (signed + notarized)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # "Developer ID Application" certificate exported as .p12, base64.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Apple notarization (app-specific password from account.apple.com,
          # NOT the account password).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

  verify:
    name: Verify the draft actually has its artifacts
    needs: artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Every expected asset must be attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" -R "${GITHUB_REPOSITORY}" --json assets -q '.assets[].name' | sort > assets.txt
          echo "Assets attached to $TAG:"; cat assets.txt
          # electron-builder can skip uploads and still exit 0 (it did once:
          # a hand-created published release made every artifact "skipped
          # publishing" while all three jobs went green). Assert the result
          # instead of trusting the exit code. The three latest*.yml files are
          # what the auto-updater reads: without them, updates are dead.
          missing=0
          for pattern in 'Voksa-Setup-.*\.exe$' 'latest\.yml$' \
                         '.*-mac-x64\.dmg$' '.*-mac-arm64\.dmg$' \
                         '.*-mac-x64\.zip$' '.*-mac-arm64\.zip$' 'latest-mac\.yml$' \
                         '.*\.AppImage$' '.*\.deb$' 'latest-linux\.yml$'; do
            if ! grep -qE "$pattern" assets.txt; then
              echo "::error::Missing release asset matching /$pattern/"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::The draft is incomplete. Do NOT publish it: users (and the auto-updater) would get a broken release."
            exit 1
          fi
          echo "All expected artifacts are attached."
